[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "cc-clean"
description = "Interactive Claude local cleanup helper with backup-aware TUI flows."
readme = "readme.md"
requires-python = ">=3.8"
dependencies = []
dynamic = ["version"]

[project.scripts]
cc-clean = "cc_clean.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.dynamic]
version = {attr = "cc_clean.__version__"}
