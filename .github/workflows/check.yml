name: Check

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Package
        run: python -m pip install -e .

      - name: Run Checks
        run: make check

      - name: Build Release Archive
        run: sh ./release.sh --output-dir /tmp/codex-session-cloner-release

  installers:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
            install-command: sh ./install.sh --force
            run-command: sh ./codex-session-cloner --version
          - os: windows-latest
            python-version: "3.11"
            install-command: powershell -ExecutionPolicy Bypass -File .\install.ps1 -Force
            run-command: .\codex-session-cloner.cmd --version

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install With Project Installer
        run: ${{ matrix.install-command }}

      - name: Run Installed Command
        run: ${{ matrix.run-command }}
